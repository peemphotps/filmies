<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Filmies — Film Camera</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(120% 100% at 50% 0%, #2a2a2e 0%, #161618 55%, #0d0d0f 100%);
    font-family: -apple-system, system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; padding: 24px;
  }
  .wordmark {
    display: flex; align-items: center; gap: 9px;
    color: #f3f3f5; letter-spacing: 0.5px;
  }
  .wordmark .dot { width: 13px; height: 13px; border-radius: 50%;
    background: conic-gradient(#E0A24A,#E2231A,#2B6CB0,#6FBF73,#E0A24A);
    box-shadow: 0 0 12px rgba(255,255,255,0.25); }
  .wordmark b { font-size: 18px; font-weight: 700; }
  .wordmark span { font-size: 13px; color: #8a8a90; font-weight: 500; }
  @keyframes grainShift {
    0% { transform: translate(0,0); } 100% { transform: translate(-8px,6px); }
  }
  input[type=range] { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="recipes.jsx"></script>
<script type="text/babel" src="viewfinder.jsx"></script>
<script type="text/babel" src="pickers.jsx"></script>
<script type="text/babel" src="camera.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "picker": "Dial"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
    return (
      <React.Fragment>
        <div className="wordmark">
          <span className="dot"></span>
          <b>Filmies</b>
          <span>· analog looks, live</span>
        </div>

        <window.IOSDevice dark>
          <window.CameraApp pickerStyle={String(t.picker).toLowerCase()} />
        </window.IOSDevice>

        <window.TweaksPanel title="Tweaks">
          <window.TweakSection label="Film picker" />
          <window.TweakRadio label="Picker style" value={t.picker}
            options={['Dial', 'Wheel', 'Sheet']}
            onChange={(v) => setTweak('picker', v)} />
        </window.TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
